<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="MSP PreCheck">
<meta name="theme-color" content="#0a0a0f">
<title>MSP PreCheck Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  :root {
    --pass: #00e676;
    --fail: #ff3d00;
    --bg: #0a0a0f;
    --text: #e8e8f0;
    --muted: #555566;
    --bar-height: 90px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'DM Mono', monospace; color: var(--text); }

  #splash {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; z-index: 100; transition: opacity 0.4s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }
  .splash-logo { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase; }
  .splash-title { font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); line-height: 1; text-align: center; }
  .splash-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; margin-top: 4px; }
  #startBtn {
    margin-top: 40px; background: var(--text); color: var(--bg); border: none;
    border-radius: 14px; padding: 18px 48px; font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 800; letter-spacing: 0.05em; cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  #startBtn:active { transform: scale(0.96); opacity: 0.85; }

  #loadingMsg {
    display: none; margin-top: 20px;
    font-size: 11px; color: var(--muted); letter-spacing: 0.15em;
  }

  #cameraWrap { position: fixed; inset: 0; background: #000; display: none; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #scanCanvas { display: none; }

  #overlay { position: fixed; inset: 0; pointer-events: none; display: none; }
  .scan-frame {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -58%);
    width: min(78vw, 320px); height: min(52vw, 210px);
  }
  .corner { position: absolute; width: 22px; height: 22px; border-color: rgba(255,255,255,0.75); border-style: solid; }
  .corner.tl { top:0; left:0; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
  .corner.tr { top:0; right:0; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
  .corner.bl { bottom:0; left:0; border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
  .corner.br { bottom:0; right:0; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }
  .scan-line {
    position: absolute; left: 2px; right: 2px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
    animation: scanMove 2s ease-in-out infinite;
  }
  @keyframes scanMove {
    0%   { top: 4px; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: calc(100% - 4px); opacity: 0; }
  }
  #scanHint {
    position: absolute; bottom: calc(var(--bar-height) + 28px); left: 0; right: 0;
    text-align: center; font-size: 11px; letter-spacing: 0.18em;
    color: rgba(255,255,255,0.4); text-transform: uppercase;
  }

  #resultBar {
    position: fixed; bottom: 0; left: 0; right: 0; height: var(--bar-height);
    display: flex; align-items: center; padding: 0 24px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 50; gap: 14px;
  }
  #resultBar.show { transform: translateY(0); }
  #resultBar.pass { background: var(--pass); }
  #resultBar.fail { background: var(--fail); }
  #resultIcon { font-size: 30px; line-height: 1; flex-shrink: 0; color: #000; }
  #resultText { flex: 1; overflow: hidden; }
  #resultName { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #resultSub { font-size: 10px; color: rgba(0,0,0,0.55); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }
  #resultBadge { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 0.08em; color: #000; background: rgba(0,0,0,0.15); border-radius: 8px; padding: 6px 10px; text-align: center; flex-shrink: 0; }

  #counter { position: fixed; top: max(env(safe-area-inset-top, 16px), 16px); right: 18px; font-size: 10px; letter-spacing: 0.15em; color: rgba(255,255,255,0.35); text-transform: uppercase; z-index: 50; display: none; }

  #errorScreen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 40px; text-align: center; z-index: 200; }
  #errorScreen.show { display: flex; }
  #errorScreen strong { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text); display: block; margin-bottom: 8px; }
  #errorScreen p { color: var(--muted); font-size: 13px; line-height: 1.7; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">Minneapolis–Saint Paul</div>
  <div class="splash-title">PreCheck<br>Scanner</div>
  <div class="splash-sub">MSP Departures Only</div>
  <button id="startBtn">Start Scanning</button>
  <div id="loadingMsg">Loading scanner...</div>
</div>

<div id="errorScreen">
  <p><strong>Error</strong><br><span id="errorMsg">Something went wrong.</span></p>
</div>

<div id="cameraWrap">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="scanCanvas"></canvas>
</div>

<div id="overlay">
  <div class="scan-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line"></div>
  </div>
  <div id="scanHint">Hold boarding pass barcode steady</div>
</div>

<div id="counter">
  <span id="passCount">0</span> passed · <span id="failCount">0</span> failed
</div>

<div id="resultBar">
  <div id="resultIcon"></div>
  <div id="resultText">
    <div id="resultName"></div>
    <div id="resultSub"></div>
  </div>
  <div id="resultBadge"></div>
</div>

<script>
// ── AUDIO ──────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playPass() {
  try {
    const ctx = getAudio();
    const t = ctx.currentTime;
    [523.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t + i * 0.13);
      gain.gain.linearRampToValueAtTime(0.18, t + i * 0.13 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.13 + 0.38);
      osc.start(t + i * 0.13); osc.stop(t + i * 0.13 + 0.4);
    });
  } catch(e) {}
}
function playFail() {
  try {
    const ctx = getAudio();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, t);
    osc.frequency.exponentialRampToValueAtTime(55, t + 0.2);
    filter.type = 'lowpass'; filter.frequency.value = 280;
    gain.gain.setValueAtTime(0.22, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.start(t); osc.stop(t + 0.3);
  } catch(e) {}
}

// ── BCBP PARSER ────────────────────────────────────────────
function parseBCBP(raw) {
  try {
    if (!raw || raw.length < 30) return null;
    if (raw[0] !== 'M') return null;

    const nameRaw = raw.substring(2, 22).trim();
    let displayName = nameRaw;
    if (nameRaw.includes('/')) {
      const parts = nameRaw.split('/');
      const last = parts[0].trim();
      const first = (parts[1] || '').trim().split(/\s+/)[0];
      displayName = first ? `${first} ${last}` : last;
    }

    const origin = raw.substring(30, 33).trim().toUpperCase();
    const destination = raw.substring(33, 36).trim().toUpperCase();

    let hasPrecheck = false;
    if (raw.length > 96 && raw[96] === '1') hasPrecheck = true;
    if (!hasPrecheck) {
      const upper = raw.toUpperCase();
      if (upper.includes('TSAPRECHK') || upper.includes('TSA PRE') ||
          upper.includes('PRECHK') || upper.includes('TSA>') || upper.includes('^>')) {
        hasPrecheck = true;
      }
    }
    if (!hasPrecheck && raw.length > 108 && raw[108] === '1') hasPrecheck = true;
    if (!hasPrecheck && raw.length > 72 && raw[72] === '1') hasPrecheck = true;

    return { origin, destination, displayName, hasPrecheck };
  } catch(e) { return null; }
}

// ── DUPLICATE DETECTION ────────────────────────────────────
const recentScans = new Map();
const DUPE_WINDOW = 2 * 60 * 1000;
function isDuplicate(key) {
  const now = Date.now();
  for (const [k, ts] of recentScans) { if (now - ts > DUPE_WINDOW) recentScans.delete(k); }
  if (recentScans.has(key)) return true;
  recentScans.set(key, now);
  return false;
}

// ── RESULT UI ──────────────────────────────────────────────
let resultTimer = null;
let passCount = 0, failCount = 0;
function showResult(type, name, sub, badge) {
  const bar = document.getElementById('resultBar');
  bar.className = 'show ' + type;
  document.getElementById('resultIcon').textContent = type === 'pass' ? '✓' : '✕';
  document.getElementById('resultName').textContent = name;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('resultBadge').textContent = badge;
  if (resultTimer) clearTimeout(resultTimer);
  resultTimer = setTimeout(() => { bar.className = ''; }, 3500);
  if (type === 'pass') { passCount++; playPass(); }
  else { failCount++; playFail(); }
  document.getElementById('passCount').textContent = passCount;
  document.getElementById('failCount').textContent = failCount;
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorScreen').classList.add('show');
}

// ── SCAN HANDLER ──────────────────────────────────────────
let lastRaw = '';
let lastRawTime = 0;
function handleScan(raw) {
  const now = Date.now();
  if (raw === lastRaw && now - lastRawTime < 2000) return;
  lastRaw = raw; lastRawTime = now;
  console.log('RAW SCAN:', raw);

  const data = parseBCBP(raw);
  if (!data) { showResult('fail', 'Invalid Barcode', 'Not a valid boarding pass format', 'ERROR'); return; }

  const key = raw.substring(2, 50).replace(/\s/g, '');
  if (isDuplicate(key)) { showResult('fail', data.displayName || 'Passenger', 'Boarding pass already scanned recently', 'DUPLICATE'); return; }
  if (data.origin !== 'MSP') { showResult('fail', data.displayName || 'Passenger', `Origin: ${data.origin || 'Unknown'} — MSP departures only`, 'WRONG AIRPORT'); return; }
  if (!data.hasPrecheck) { showResult('fail', data.displayName || 'Passenger', 'No TSA PreCheck on this boarding pass', 'NO PRECHECK'); return; }

  showResult('pass', data.displayName || 'Passenger', `MSP → ${data.destination} · TSA PreCheck`, 'PRECHECK ✓');
}

// ── SCANNER USING CANVAS + ZXING ──────────────────────────
async function startScanner() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('scanCanvas');
  const ctx2d = canvas.getContext('2d', { willReadFrequently: true });

  document.getElementById('cameraWrap').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('counter').style.display = 'block';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    video.srcObject = stream;
    await video.play();
  } catch(e) {
    showError('Camera access was denied. Please allow camera access and reload.');
    return;
  }

  // Wait for ZXing to be available
  let attempts = 0;
  while (typeof ZXing === 'undefined' && attempts < 50) {
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }

  if (typeof ZXing === 'undefined') {
    showError('Scanner library failed to load. Please check your connection and reload.');
    return;
  }

  const hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.PDF_417,
    ZXing.BarcodeFormat.QR_CODE,
    ZXing.BarcodeFormat.AZTEC,
    ZXing.BarcodeFormat.DATA_MATRIX,
    ZXing.BarcodeFormat.CODE_128
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  const reader = new ZXing.MultiFormatReader();
  reader.setHints(hints);

  async function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx2d.drawImage(video, 0, 0);

      try {
        const imageData = ctx2d.getImageData(0, 0, canvas.width, canvas.height);
        const luminanceSource = new ZXing.RGBLuminanceSource(imageData.data, canvas.width, canvas.height);
        const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
        const result = reader.decode(binaryBitmap);
        if (result) handleScan(result.getText());
      } catch(e) {
        // NotFoundException is normal — no barcode in frame
      }
    }
    requestAnimationFrame(tick);
  }

  tick();
}

// ── INIT ───────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  getAudio();
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('startBtn').style.display = 'none';
  const splash = document.getElementById('splash');
  setTimeout(() => {
    splash.classList.add('hidden');
    setTimeout(() => { splash.style.display = 'none'; startScanner(); }, 400);
  }, 300);
});
</script>

<!-- ZXing from jsDelivr — more reliable than cdnjs for this package -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
</body>
</html>
