<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>MSP PreCheck - Debug</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e8e8f0; font-family: monospace; font-size: 13px; }

  #video { width: 100%; max-height: 40vh; object-fit: cover; display: block; background: #111; }
  #scanCanvas { display: none; }

  #log {
    padding: 10px;
    height: calc(60vh - 60px);
    overflow-y: auto;
    border-top: 1px solid #333;
  }
  .log-line { padding: 3px 0; border-bottom: 1px solid #1a1a2a; word-break: break-all; }
  .log-ok   { color: #00e676; }
  .log-err  { color: #ff3d00; }
  .log-info { color: #aaa; }
  .log-scan { color: #ffeb3b; font-weight: bold; }

  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; gap: 8px; padding: 10px;
    background: #13131a; border-top: 1px solid #333;
  }
  button {
    flex: 1; padding: 12px; border: none; border-radius: 8px;
    font-family: monospace; font-size: 13px; cursor: pointer;
    background: #e8e8f0; color: #0a0a0f; font-weight: bold;
  }
  button:active { opacity: 0.7; }
</style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>
<canvas id="scanCanvas"></canvas>

<div id="log"></div>

<div id="controls">
  <button onclick="startCamera()">1. Start Camera</button>
  <button onclick="testZXing()">2. Test ZXing</button>
  <button onclick="startScan()">3. Start Scan</button>
</div>

<script>
const logEl = document.getElementById('log');
function log(msg, type='info') {
  const d = document.createElement('div');
  d.className = 'log-line log-' + type;
  d.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  logEl.prepend(d);
}

log('Page loaded. Tap "1. Start Camera" first.', 'info');

const video = document.getElementById('video');
const canvas = document.getElementById('scanCanvas');
const ctx2d = canvas.getContext('2d', { willReadFrequently: true });

// ── STEP 1: CAMERA ────────────────────────────────────────
async function startCamera() {
  log('Requesting camera...', 'info');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    log('Camera started OK', 'ok');
    log(`Video size: ${video.videoWidth}x${video.videoHeight}`, 'info');
  } catch(e) {
    log('Camera error: ' + e.message, 'err');
  }
}

// ── STEP 2: TEST ZXING ────────────────────────────────────
function testZXing() {
  log('Checking ZXing...', 'info');

  if (typeof ZXing === 'undefined') {
    log('ZXing is NOT defined — library failed to load!', 'err');
    return;
  }

  log('ZXing object found', 'ok');
  log('ZXing keys: ' + Object.keys(ZXing).slice(0, 10).join(', '), 'info');

  try {
    const r = new ZXing.MultiFormatReader();
    log('MultiFormatReader created OK', 'ok');
  } catch(e) {
    log('MultiFormatReader error: ' + e.message, 'err');
  }

  try {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.PDF_417, ZXing.BarcodeFormat.QR_CODE]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    log('Hints created OK', 'ok');
    log('PDF_417 format: ' + ZXing.BarcodeFormat.PDF_417, 'info');
    log('QR_CODE format: ' + ZXing.BarcodeFormat.QR_CODE, 'info');
  } catch(e) {
    log('Hints error: ' + e.message, 'err');
  }
}

// ── STEP 3: SCAN ──────────────────────────────────────────
let scanning = false;
async function startScan() {
  if (scanning) { log('Already scanning', 'info'); return; }

  if (video.readyState < 2) {
    log('Camera not ready — start camera first', 'err');
    return;
  }

  if (typeof ZXing === 'undefined') {
    log('ZXing not loaded — tap Test ZXing to diagnose', 'err');
    return;
  }

  log('Setting up ZXing reader...', 'info');

  let reader;
  try {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.PDF_417,
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.AZTEC,
      ZXing.BarcodeFormat.DATA_MATRIX,
      ZXing.BarcodeFormat.CODE_128
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    reader = new ZXing.MultiFormatReader();
    reader.setHints(hints);
    log('Reader ready — scanning started', 'ok');
    log('Point camera at ANY barcode or QR code to test', 'info');
  } catch(e) {
    log('Reader setup failed: ' + e.message, 'err');
    return;
  }

  scanning = true;
  let frameCount = 0;
  let lastScan = '';
  let lastScanTime = 0;

  async function tick() {
    if (!scanning) return;

    frameCount++;
    if (frameCount % 30 === 0) {
      // Log every 30 frames so we know the loop is running
      if (video.videoWidth > 0) {
        log(`Scanning... frame ${frameCount}, video ${video.videoWidth}x${video.videoHeight}`, 'info');
      } else {
        log(`Frame ${frameCount} — video size is 0x0, camera may not be ready`, 'err');
      }
    }

    if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx2d.drawImage(video, 0, 0);

      try {
        const imageData = ctx2d.getImageData(0, 0, canvas.width, canvas.height);
        const luminanceSource = new ZXing.RGBLuminanceSource(imageData.data, canvas.width, canvas.height);
        const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
        const result = reader.decode(binaryBitmap);

        if (result) {
          const raw = result.getText();
          const now = Date.now();
          if (raw !== lastScan || now - lastScanTime > 2000) {
            lastScan = raw;
            lastScanTime = now;
            log('SCANNED: ' + raw.substring(0, 80), 'scan');
            log('Format: ' + result.getBarcodeFormat(), 'ok');
            log('Full length: ' + raw.length + ' chars', 'info');
          }
        }
      } catch(e) {
        // NotFoundException is totally normal — just means no barcode in frame
        // Only log unexpected errors
        if (e.name !== 'NotFoundException' && frameCount % 60 === 0) {
          log('Decode error: ' + e.name + ' - ' + e.message, 'err');
        }
      }
    }

    requestAnimationFrame(tick);
  }

  tick();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"
  onload="log('ZXing script loaded from CDN', 'ok')"
  onerror="log('ZXing CDN FAILED to load — network issue?', 'err')">
</script>

</body>
</html>
